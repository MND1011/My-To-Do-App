<!DOCTYPE html>
<h2>📆 Calendar</h2>
<div id="calendar"></div>
<button id="themeToggle">🌙</button>
<html lang="en">
  <head>
    <meta name="description" content="My To-Do App - A simple and powerful task manager with dark mode and filters.">
<meta name="keywords" content="to do app, task manager, todo list, productivity app">
<meta name="author" content="Your Name">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>My To-Do App</title>
  <link rel="stylesheet" href="style.css">
    <meta name="google-site-verification" content="vOCV0Os45gOzk5Hj7LPyPyaB-r42zgN7ClSEJY7xaJQ" />
</head>
<body>

  <div class="container">
    <h1>My To-Do List</h1>

    <div class="card">
      <!-- Calendar FIRST -->
      <input type="date" id="dateInput" />
      
      <!-- Space + Task input -->
      <input type="text" id="taskInput" placeholder="Enter a title..." />
      </div>

    <div class="input-section"> 
      <input type="text" id="taskInput" placeholder="Enter task details..."> 
     
      <button onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>
    <p id="taskCount">0 tasks</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
