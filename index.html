<!DOCTYPE html>
<button id="themeToggle">🌙</button>
<html lang="en">
  <head>
    <meta name="description" content="My To-Do App - A simple and powerful task manager with dark mode and filters.">
<meta name="keywords" content="to do app, task manager, todo list, productivity app">
<meta name="author" content="Your Name">
  <meta charset="UTF-8">
  <title>My To-Do App</title>
  <link rel="stylesheet" href="style.css">
    <meta name="google-site-verification" content="vOCV0Os45gOzk5Hj7LPyPyaB-r42zgN7ClSEJY7xaJQ" />
</head>
<body>

  <div class="container">
    <h1>My To-Do List</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Enter a task...">
      <button id="addBtn">Add</button>
    </div>

    <div class="filters">
  <button onclick="filterTasks('all')">All</button>
  <button onclick="filterTasks('done')">Done</button>
  <button onclick="filterTasks('pending')">Pending</button>
</div>
    <ul id="taskList"></ul>
    <p id="taskCount">0 tasks</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
